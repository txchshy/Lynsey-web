<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=yes">
    <title>数字孪生仿真沙盒</title>
    <script src="../../lib/echarts.min.js"></script>
    <script src="../../lib/echarts-wordcloud.min.js"></script>
    <link rel="stylesheet" href="twin.css?v=4">
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- ── 顶部导航 ── -->
    <nav class="top-nav">
        <a href="/" class="nav-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </a>
        <div class="nav-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            数字孪生仿真沙盒
        </div>
        <div class="nav-info">
            <button id="btn-history" class="nav-btn-history">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                历史记录
            </button>
            <button class="nav-btn-history" onclick="window.location.href='/pages/analysis/'" style="background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(0,180,255,0.15));border-color:rgba(168,85,247,0.3)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path>
                </svg>
                分析对比
            </button>
            <span id="current-time"></span>
            <span id="agent-count">500 Agents</span>
        </div>
    </nav>

    <!-- ── 主体布局：左侧输入 + 右侧结果 ── -->
    <div class="main-container">

        <!-- 左侧：参数配置面板 -->
        <div class="panel panel-input">
            <div class="panel-header">
                <h2>仿真参数配置</h2>
                <span class="panel-badge">Digital Twin</span>
            </div>

            <!-- 省份 -->
            <div class="form-group">
                <label>省份 <span class="label-hint">(必选)</span></label>
                <select id="province-select">
                    <option value="">请选择省份</option>
                </select>
            </div>

            <!-- 城市 + 区域 -->
            <div class="form-row">
                <div class="form-group">
                    <label>城市 <span class="label-hint">(必选)</span></label>
                    <select id="city-select" disabled>
                        <option value="">请先选择省份</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>区域 <span class="label-hint">(必选)</span></label>
                    <select id="district-input" disabled>
                        <option value="">请先选择城市</option>
                    </select>
                </div>
            </div>

            <!-- 详细地址 -->
            <div class="form-group">
                <label>详细地址 <span class="label-hint">(必填)</span></label>
                <input type="text" id="address-input" placeholder="如：太平街88号">
            </div>

            <!-- 餐厅名称 -->
            <div class="form-group">
                <label>餐厅名称 <span class="label-hint">(必填)</span></label>
                <input type="text" id="restaurant-name" placeholder="如：湘味坊">
            </div>

            <!-- 餐饮大类 + 菜系 -->
            <div class="form-row">
                <div class="form-group">
                    <label>餐饮大类 <span class="label-hint">(必选)</span></label>
                    <select id="cuisine-category-select">
                        <option value="">正在加载...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>菜系类型 <span class="label-hint">(必选)</span></label>
                    <select id="cuisine-select" disabled>
                        <option value="">请先选择餐饮大类</option>
                    </select>
                </div>
            </div>

            <!-- 客单价 -->
            <div class="form-group">
                <label>客单价(元) <span class="label-hint">(必填)</span></label>
                <input type="number" id="avg-price" placeholder="如：60" min="5" max="5000">
            </div>

            <!-- 启动仿真 -->
            <button id="start-simulation" class="btn-simulate" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                启动数字孪生仿真
            </button>
            <div class="sim-hint">填写全部参数后可启动仿真</div>
        </div>

        <!-- 右侧：结果面板 -->
        <div class="panel panel-result">

            <!-- 等待占位 -->
            <div id="result-placeholder" class="result-placeholder" style="display:flex">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--accent-purple);opacity:0.6">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <h3>等待仿真启动</h3>
                <p>在左侧配置餐厅参数后启动仿真</p>
                <p class="sub-hint">Agent 群体将模拟真实客群对餐厅的反应</p>
            </div>

            <!-- 仿真进度 -->
            <div id="simulation-progress" class="sim-progress" style="display:none">
                <div class="progress-header">
                    <h2>仿真进行中...</h2>
                    <div class="progress-header-right">
                        <button id="pause-simulation" class="btn-pause" style="display:none">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                            暂停
                        </button>
                        <button id="stop-simulation" class="btn-stop" style="display:none">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"></rect></svg>
                            结束
                        </button>
                        <span id="progress-timer" class="progress-timer">0.0s</span>
                    </div>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="progress-bar" class="progress-bar" style="width:0%"></div>
                </div>
                <div id="progress-text" class="progress-text">正在初始化仿真环境...</div>
                <div id="progress-groups" class="progress-groups"></div>

                <!-- 五大类实时反馈 -->
                <div id="live-feedback" class="live-feedback">
                    <h3>各组实时反馈</h3>
                    <div id="category-boxes" class="category-boxes"></div>
                </div>
            </div>

            <!-- 仿真结果 -->
            <div id="simulation-result" style="display:none">
                <div class="result-header">
                    <h2>仿真结果</h2>
                    <div class="result-meta">
                        <span id="result-duration"></span>
                        <span id="result-agents"></span>
                    </div>
                </div>

                <!-- 概览卡片 -->
                <div id="stat-cards" class="stat-cards"></div>

                <!-- 图表网格 -->
                <div class="chart-grid">
                    <div class="chart-box">
                        <h3>客户意向分布</h3>
                        <div id="chart-opinion" class="chart-canvas"></div>
                    </div>
                    <div class="chart-box">
                        <h3>行为统计</h3>
                        <div id="chart-actions" class="chart-canvas"></div>
                    </div>
                    <div class="chart-box">
                        <h3>就餐频率分布</h3>
                        <div id="chart-frequency" class="chart-canvas"></div>
                    </div>
                    <div class="chart-box">
                        <h3>消费预算分布</h3>
                        <div id="chart-budget" class="chart-canvas"></div>
                    </div>
                    <div class="chart-box">
                        <h3>到访意愿</h3>
                        <div id="chart-visit" class="chart-canvas"></div>
                    </div>
                    <div class="chart-box">
                        <h3>价格接受度</h3>
                        <div id="chart-price-accept" class="chart-canvas"></div>
                    </div>
                </div>

                <!-- 评论词云 -->
                <div id="wordcloud-section" class="chart-box" style="display:none;margin-bottom:20px">
                    <h3>消费者评论词云</h3>
                    <div id="chart-wordcloud" style="width:100%;height:300px"></div>
                </div>

                <!-- AI 经营建议 -->
                <div class="advice-section">
                    <h3>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        AI 经营建议
                    </h3>
                    <div id="ai-advice" class="advice-content"></div>
                </div>

                <!-- 操作栏 -->
                <div class="action-bar">
                    <button id="download-report" class="btn-download">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        下载仿真报告
                    </button>
                    <button id="restart-simulation" class="btn-restart">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        重新仿真
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── 历史记录弹窗 ── -->
    <div id="history-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <h2>仿真历史记录</h2>
                <button id="close-history" class="modal-close">&times;</button>
            </div>
            <div id="history-list" class="history-list">
                <div class="history-loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- ── 选址分析补充信息弹窗 ── -->
    <div id="location-supplement-modal" class="modal-overlay" style="display:none">
        <div class="modal-box" style="max-width:560px">
            <div class="modal-header">
                <h2>补充选址分析信息</h2>
                <button onclick="document.getElementById('location-supplement-modal').style.display='none'" class="modal-close">&times;</button>
            </div>
            <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px">该店铺尚无选址分析报告，请补充以下信息，系统将自动运行选址分析</p>
            <div class="supplement-form">
                <div class="supp-row">
                    <label>商圈商场 *</label>
                    <input type="text" id="supp-business-area" placeholder="如：望京SOHO">
                </div>
                <div class="supp-row">
                    <label>月租金(元) *</label>
                    <input type="number" id="supp-monthly-rent" placeholder="如：15000">
                </div>
                <div class="supp-row">
                    <label>店内面积(㎡) *</label>
                    <input type="number" id="supp-area-sqm" placeholder="如：120">
                </div>
                <div class="supp-row">
                    <label>期望月营收(元) *</label>
                    <input type="number" id="supp-monthly-revenue" placeholder="如：300000">
                </div>
                <div class="supp-row">
                    <label>装修费(元)</label>
                    <input type="number" id="supp-renovation" placeholder="如：200000" value="0">
                </div>
                <div class="supp-row">
                    <label>设备采购费(元)</label>
                    <input type="number" id="supp-equipment" placeholder="如：100000" value="0">
                </div>
                <div class="supp-row">
                    <label>加盟费(元)</label>
                    <input type="number" id="supp-franchise" placeholder="如有" value="0">
                </div>
                <div class="supp-row">
                    <label>备货及推广费(元)</label>
                    <input type="number" id="supp-stock-promo" placeholder="如：50000" value="0">
                </div>
                <div class="supp-row">
                    <label>品牌影响力(1-10) *</label>
                    <input type="number" id="supp-brand" min="1" max="10" value="5">
                </div>
                <div class="supp-row">
                    <label>5km人均月收入(元) *</label>
                    <input type="number" id="supp-income" placeholder="如：12000" value="12000">
                </div>
            </div>
            <button id="supp-submit-btn" class="btn-primary" style="width:100%;margin-top:14px;padding:10px;font-size:14px" onclick="submitLocationSupplement()">
                运行选址分析
            </button>
            <div id="supp-progress" style="display:none;text-align:center;padding:10px;color:var(--accent);font-size:13px">
                <span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(0,180,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px"></span>
                正在运行选址分析，请稍候...
            </div>
        </div>
    </div>
    <style>
        .supplement-form { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .supp-row { display:flex; flex-direction:column; gap:3px; }
        .supp-row label { font-size:11px; color:var(--text-dim); }
        .supp-row input { padding:7px 10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:5px; color:var(--text-primary); font-size:13px; }
        .supp-row input:focus { border-color:var(--accent); outline:none; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>

    <!-- ── 脚本加载 ── -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/common.js"></script>
    <script src="twin.js?v=4"></script>
</body>
</html>
