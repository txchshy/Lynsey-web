<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐饮探店视频生成 - Leviathan</title>
    <link rel="stylesheet" href="../../css/lynsey.css">
    <style>
        /* 视频生成器专用样式 */
        .video-generator-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.1), rgba(157, 0, 255, 0.1));
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .generator-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .generator-header h1 {
            color: #0a84ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(10, 132, 255, 0.5);
        }

        .generator-header p {
            color: #00f2fe;
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(10, 132, 255, 0.3);
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            color: #00f2fe;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab.active {
            color: #0a84ff;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0a84ff, #00f2fe);
        }

        .tab:hover {
            color: #9d00ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #00f2fe;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 1px solid rgba(10, 132, 255, 0.3);
            border-radius: 8px;
            background: rgba(3, 24, 66, 0.6);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .template-selector {
            background: rgba(3, 24, 66, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(10, 132, 255, 0.3);
        }

        .template-preview {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 8px;
            border-left: 4px solid #00f2fe;
        }

        .style-tags {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(157, 0, 255, 0.2);
            border: 1px solid rgba(157, 0, 255, 0.5);
            border-radius: 20px;
            color: #00f2fe;
            font-size: 0.85rem;
            margin-right: 8px;
            margin-bottom: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a84ff, #00f2fe);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00f2fe, #0a84ff);
            box-shadow: 0 5px 20px rgba(10, 132, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(157, 0, 255, 0.2);
            color: #00f2fe;
            border: 1px solid rgba(157, 0, 255, 0.5);
        }

        .btn-secondary:hover {
            background: rgba(157, 0, 255, 0.3);
            border-color: #9d00ff;
        }

        .btn-danger {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.5);
        }

        .btn-danger:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .progress-container {
            margin: 20px 0;
            padding: 20px;
            background: rgba(3, 24, 66, 0.8);
            border-radius: 12px;
            border: 1px solid rgba(10, 132, 255, 0.3);
            display: none;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(10, 132, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0a84ff, #00f2fe);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            color: #00f2fe;
            text-align: center;
            font-size: 0.9rem;
        }

        .video-result {
            margin-top: 30px;
            display: none;
        }

        .video-result-card {
            background: rgba(3, 24, 66, 0.8);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(10, 132, 255, 0.3);
        }

        .video-preview {
            text-align: center;
            margin-bottom: 20px;
        }

        .video-preview video {
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 100%;
        }

        .video-info {
            color: #00f2fe;
        }

        .video-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .history-section {
            margin-top: 40px;
        }

        .history-section h2 {
            color: #0a84ff;
            margin-bottom: 20px;
        }

        .history-item {
            background: rgba(3, 24, 66, 0.6);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(10, 132, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-info h4 {
            color: #00f2fe;
            margin-bottom: 5px;
        }

        .history-meta {
            color: #9d00ff;
            font-size: 0.9rem;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        .menu-item {
            background: rgba(3, 24, 66, 0.6);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(10, 132, 255, 0.2);
        }

        .menu-item-form {
            display: grid;
            grid-template-columns: 1fr 2fr 100px 120px auto;
            gap: 10px;
            align-items: center;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification-success {
            background: linear-gradient(135deg, #00c851, #00ff8f);
        }

        .notification-error {
            background: linear-gradient(135deg, #ff3b30, #ff6b6b);
        }

        .notification-info {
            background: linear-gradient(135deg, #0a84ff, #00f2fe);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(10, 132, 255, 0.3);
            border-top: 3px solid #0a84ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .uploaded-images {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .uploaded-image {
            transition: transform 0.3s ease;
        }

        .uploaded-image:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .menu-item-form {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .video-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="video-generator-container">
        <div class="generator-header">
            <h1>🎬 餐饮探店视频生成</h1>
            <p>AI智能生成专业餐饮宣传视频，助力餐厅营销推广</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('promo')">宣传视频</button>
            <button class="tab" onclick="switchTab('menu')">菜单展示</button>
            <button class="tab" onclick="switchTab('history')">历史记录</button>
        </div>

        <!-- 宣传视频标签页 -->
        <div id="promo-tab" class="tab-content active">
            <form id="video-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="restaurant-name">餐厅名称 *</label>
                        <input type="text" id="restaurant-name" required placeholder="请输入餐厅名称">
                    </div>
                    
                    <div class="form-group">
                        <label for="restaurant-location">餐厅位置 *</label>
                        <input type="text" id="restaurant-location" required placeholder="请输入餐厅地址">
                    </div>
                    
                    <div class="form-group">
                        <label for="restaurant-cuisine">菜系类型 *</label>
                        <select id="restaurant-cuisine" required>
                            <option value="">请选择菜系</option>
                            <option value="川菜">川菜</option>
                            <option value="粤菜">粤菜</option>
                            <option value="湘菜">湘菜</option>
                            <option value="鲁菜">鲁菜</option>
                            <option value="苏菜">苏菜</option>
                            <option value="浙菜">浙菜</option>
                            <option value="闽菜">闽菜</option>
                            <option value="徽菜">徽菜</option>
                            <option value="日料">日料</option>
                            <option value="韩料">韩料</option>
                            <option value="西餐">西餐</option>
                            <option value="东南亚菜">东南亚菜</option>
                            <option value="火锅">火锅</option>
                            <option value="烧烤">烧烤</option>
                            <option value="快餐">快餐</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="restaurant-atmosphere">环境描述</label>
                        <input type="text" id="restaurant-atmosphere" placeholder="如：温馨舒适、现代简约、高端大气等">
                    </div>
                    
                    <div class="form-group">
                        <label for="price-range">价格区间</label>
                        <input type="text" id="price-range" placeholder="如：人均50-80元">
                    </div>
                    
                    <div class="form-group">
                        <label for="specialties">特色介绍</label>
                        <input type="text" id="specialties" placeholder="如：秘制配方、新鲜食材、特色服务等">
                    </div>
                    
                    <div class="form-group">
                        <label for="signature-dishes">招牌菜品</label>
                        <input type="text" id="signature-dishes" placeholder="用逗号分隔，如：麻婆豆腐,水煮鱼,回锅肉">
                    </div>
                    
                    <div class="form-group">
                        <label for="video-duration">视频时长（秒）</label>
                        <input type="number" id="video-duration" min="10" max="120" value="30">
                    </div>
                    
                    <div class="form-group">
                        <label for="aspect-ratio">视频比例</label>
                        <select id="aspect-ratio">
                            <option value="9:16">9:16 (竖屏)</option>
                            <option value="16:9">16:9 (横屏)</option>
                            <option value="1:1">1:1 (方形)</option>
                        </select>
                    </div>
                </div>

                <div class="template-selector">
                    <div class="form-group">
                        <label for="video-template">视频模板</label>
                        <select id="video-template">
                            <option value="">选择视频模板</option>
                        </select>
                    </div>
                    <div id="template-preview"></div>
                </div>

                <div class="form-group">
                    <label for="custom-script">自定义脚本（可选）</label>
                    <textarea id="custom-script" placeholder="如果需要自定义视频脚本，请在此输入..."></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="include-menu" checked>
                        自动生成菜单内容
                    </label>
                </div>

                <div class="form-group">
                    <label for="restaurant-image-upload">上传餐厅图片（可选）</label>
                    <input type="file" id="restaurant-image-upload" accept="image/*">
                    <div id="uploaded-images"></div>
                </div>

                <button type="button" id="generate-video-btn" class="btn btn-primary">
                    🎬 生成宣传视频
                </button>
            </form>
        </div>

        <!-- 菜单展示标签页 -->
        <div id="menu-tab" class="tab-content">
            <form id="menu-video-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="menu-restaurant-name">餐厅名称 *</label>
                        <input type="text" id="menu-restaurant-name" required placeholder="请输入餐厅名称">
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-restaurant-location">餐厅位置 *</label>
                        <input type="text" id="menu-restaurant-location" required placeholder="请输入餐厅地址">
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-restaurant-cuisine">菜系类型 *</label>
                        <select id="menu-restaurant-cuisine" required>
                            <option value="">请选择菜系</option>
                            <option value="川菜">川菜</option>
                            <option value="粤菜">粤菜</option>
                            <option value="湘菜">湘菜</option>
                            <option value="鲁菜">鲁菜</option>
                            <option value="日料">日料</option>
                            <option value="西餐">西餐</option>
                            <option value="火锅">火锅</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-restaurant-atmosphere">环境描述</label>
                        <input type="text" id="menu-restaurant-atmosphere" placeholder="餐厅环境特色">
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-price-range">价格区间</label>
                        <input type="text" id="menu-price-range" placeholder="人均消费水平">
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-specialties">特色介绍</label>
                        <input type="text" id="menu-specialties" placeholder="餐厅特色和亮点">
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-video-template">视频模板</label>
                        <select id="menu-video-template">
                            <option value="">选择视频模板</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="menu-video-duration">视频时长（秒）</label>
                        <input type="number" id="menu-video-duration" min="15" max="180" value="45">
                    </div>
                </div>

                <div class="menu-section">
                    <h3>菜品信息</h3>
                    <div id="menu-items-container">
                        <!-- 菜品项目将动态添加到这里 -->
                    </div>
                    <button type="button" onclick="addMenuItem()" class="btn btn-secondary">
                        ➕ 添加菜品
                    </button>
                </div>

                <button type="button" id="generate-menu-video-btn" class="btn btn-primary">
                    🍽️ 生成菜单视频
                </button>
            </form>
        </div>

        <!-- 历史记录标签页 -->
        <div id="history-tab" class="tab-content">
            <div class="history-section">
                <h2>📹 视频生成历史</h2>
                <div id="video-history">
                    <p class="no-history">加载中...</p>
                </div>
            </div>
        </div>

        <!-- 进度显示 -->
        <div id="progress-container" class="progress-container">
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text">准备就绪</div>
        </div>

        <!-- 视频结果 -->
        <div id="video-result" class="video-result"></div>

        <!-- 加载遮罩 -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script src="video-generator.js"></script>
    <script>
        function switchTab(tabName) {
            // 隐藏所有标签页内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 移除所有标签按钮的active类
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 显示选中的标签页
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            // 激活对应的标签按钮
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
