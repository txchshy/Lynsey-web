<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">
    <title>用户中心 - 充值</title>
    <link rel="stylesheet" href="/css/lynsey.css">
    <style>
        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
        .payment-methods {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .payment-method {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            min-width: 200px;
        }
        .qr-code {
            width: 150px;
            height: 150px;
            background: #f5f5f5;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .contact-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></a>
        <h1>用户中心</h1>
    </div>
    <div class="container">
        <div class="balance-card">
            <h2>当前余额</h2>
            <div class="balance-amount" id="balance">加载中...</div>
            <p>余额可用于选址分析和数字孪生仿真服务</p>
        </div>

        <div class="section">
            <h2>充值方式</h2>
            <div class="payment-methods" id="payment-methods">
                <div class="payment-method">
                    <h3>微信支付</h3>
                    <div class="qr-code" id="wechat-qr">
                        <span id="wechat-status">加载中...</span>
                    </div>
                    <p>扫码支付后联系客服确认</p>
                </div>
                <div class="payment-method">
                    <h3>支付宝</h3>
                    <div class="qr-code" id="alipay-qr">
                        <span id="alipay-status">加载中...</span>
                    </div>
                    <p>扫码支付后联系客服确认</p>
                </div>
            </div>
        </div>

        <div class="contact-info" id="contact-info">
            <h3>充值说明</h3>
            <p id="contact-text">加载中...</p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const API_HOST = ['localhost','127.0.0.1'].includes(window.location.hostname)
            ? `${window.location.protocol}//${window.location.hostname}:8000` : '';
        const ADMIN_API = `${API_HOST}/api/v1/admin`;
        
        async function loadBalance() {
            const user = AUTH.getUser();
            if (user) {
                document.getElementById('balance').textContent = `¥${user.balance.toFixed(2)}`;
            }
        }

        async function loadPaymentInfo() {
            try {
                const resp = await fetch(`${ADMIN_API}/payment-info`);
                const data = await resp.json();
                
                // 微信支付
                const wechatEl = document.getElementById('wechat-qr');
                if (data.wechat_url) {
                    wechatEl.innerHTML = `<img src="${data.wechat_url}" alt="微信收款码" style="width:100%;height:100%;object-fit:contain">`;
                } else {
                    wechatEl.innerHTML = '<span>未配置</span>';
                }

                // 支付宝
                const alipayEl = document.getElementById('alipay-qr');
                if (data.alipay_url) {
                    alipayEl.innerHTML = `<img src="${data.alipay_url}" alt="支付宝收款码" style="width:100%;height:100%;object-fit:contain">`;
                } else {
                    alipayEl.innerHTML = '<span>未配置</span>';
                }

                // 联系方式
                document.getElementById('contact-text').textContent = data.contact_info || '请联系管理员充值';
            } catch(e) {
                document.getElementById('wechat-status').textContent = '加载失败';
                document.getElementById('alipay-status').textContent = '加载失败';
                document.getElementById('contact-text').textContent = '加载失败，请稍后重试';
            }
        }

        // 检查登录状态
        if (!AUTH.isLoggedIn()) {
            window.location.href = '/pages/auth/login.html';
        }

        loadBalance();
        loadPaymentInfo();
    </script>
</body>
</html>
